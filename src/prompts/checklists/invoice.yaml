# Commercial invoice pages (InvoiceChecklist).
system_prompt: |
  Focus on invoice number, invoice date, and total amount due or grand total.
  Prefer the final total over subtotals unless only subtotals exist.
  Dates may appear in various formats; normalize to ISO date (YYYY-MM-DD) in the date field when possible.
  route: If the invoice mentions an airport of departure/origin or destination (e.g. "Port of Loading", "Port of Discharge", "From", "To", "Airport of Departure"), extract as flight_from and flight_to objects with name (full name) and abbr (IATA code). Return null if route information is absent.
